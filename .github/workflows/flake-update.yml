---
name: flake-update

on:
  schedule:
    - cron: "0 4 * * 1" # weekly, Monday 04:00 UTC
  workflow_dispatch: # allow manual trigger

concurrency:
  group: flake-lock-updater
  cancel-in-progress: false

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push branches
      id-token: write # required for FlakeHub / OIDC
      pull-requests: write # open PRs & enable auto-merge
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/update-flake-lock@main
        id: update
        with:
          commit-msg: "chore: update flake inputs"
          pr-title: "chore: update flake inputs"
          pr-labels: maintenance
          # runs nix flake check on the PR — catch treefmt/typos regressions
          nix-options: "--accept-flake-config"

      # Enable auto-merge — merges automatically once check.yml passes
      - if: steps.update.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ steps.update.outputs.pull-request-url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
